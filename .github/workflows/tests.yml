name: Run Tests

permissions:
  contents: read
  actions: write

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13', '3.14']

    steps:
    - name: Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}
    
    - name: Checkout
      uses: actions/checkout@v6.0.2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6.1.0
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      shell: bash
    
    - name: Create and activate virtual environment
      run: |
        uv venv
        echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
        echo "$PWD/.venv/bin" >> $GITHUB_PATH
      shell: bash

    - name: Run all tests
      run: |
        uv run pytest tests
      shell: bash

  live-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'

    steps:
    - name: Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}

    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Set up Python 3.13
      uses: actions/setup-python@v6.1.0
      with:
        python-version: '3.13'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      shell: bash

    - name: Create and activate virtual environment
      run: |
        uv venv
        echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
        echo "$PWD/.venv/bin" >> $GITHUB_PATH
      shell: bash

    - name: Run live nanopub integration tests
      env:
        PUBMATE_RUN_TESTSERVER_PUBLISH: "1"
        PUBMATE_RUN_NANOPUB_EXISTENCE_CHECK: "1"
      run: |
        uv run pytest tests/test_rdf2nanopub_integration.py
      shell: bash
